<html lang="ja">

<title>カバネリ海門決戦</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{height:100%;overscroll-behavior:none}
body{background:#05050c;color:#e0e0e0;font-family:-apple-system,BlinkMacSystemFont,'Hiragino Kaku Gothic ProN',sans-serif;font-size:14px;-webkit-font-smoothing:antialiased}
button{touch-action:manipulation;font-family:inherit;cursor:pointer;border:none;outline:none}
input[type=number]::-webkit-inner-spin-button,input[type=number]::-webkit-outer-spin-button{-webkit-appearance:none}
input[type=number]{-moz-appearance:textfield}

#W{max-width:520px;margin:0 auto;display:flex;flex-direction:column;height:100vh;height:100dvh;padding-top:env(safe-area-inset-top,0px)}

/* Header - glass effect */
#hdr{background:rgba(12,8,20,.92);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);padding:12px 14px 8px;border-bottom:1px solid rgba(255,215,0,.15);flex-shrink:0}
.hr{display:flex;align-items:center;justify-content:space-between}
.ht{font-size:16px;font-weight:900;background:linear-gradient(135deg,#FFD700,#FF8C00);-webkit-background-clip:text;-webkit-text-fill-color:transparent;letter-spacing:.5px}
.hs{font-size:10px;color:rgba(255,255,255,.35);margin-top:2px}
.hb{padding:5px 12px;border-radius:8px;font-size:11px;font-weight:700;background:rgba(255,100,100,.08);border:1px solid rgba(255,100,100,.2);color:#ff8a80;backdrop-filter:blur(10px)}
.hb.p{background:rgba(255,50,50,.15);border-color:rgba(255,50,50,.4);color:#ff5252}
.cfm{margin-top:6px;padding:5px 10px;border-radius:8px;font-size:11px;font-weight:700;backdrop-filter:blur(10px)}

/* Quick stats */
.qs{display:flex;gap:5px;flex-wrap:wrap;padding:6px 14px;background:rgba(8,8,16,.95);border-bottom:1px solid rgba(255,255,255,.04);font-size:10px;flex-shrink:0}
.qc{background:rgba(255,255,255,.04);border-radius:8px;padding:4px 8px;border:1px solid rgba(255,255,255,.06)}
.ql{color:rgba(255,255,255,.3);margin-right:3px}.qv{color:#80cbc4;font-weight:600}.qe{font-weight:700}

/* Bottom tabs - frosted glass */
#tabs{display:flex;background:rgba(10,10,18,.95);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border-top:1px solid rgba(255,255,255,.06);flex-shrink:0;padding-bottom:env(safe-area-inset-bottom)}
.tb{flex:1;padding:8px 0 6px;text-align:center;font-size:9px;font-weight:600;color:rgba(255,255,255,.3);transition:color .15s}
.tb.a{color:#FFD700}
.tb-ic{font-size:18px;display:block;margin-bottom:2px}

/* Scroll area */
#ct{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;background:#05050c}

/* === Record tab === */
.inp{padding:12px 14px}
.ig{display:flex;gap:8px;margin-bottom:10px;align-items:center;flex-wrap:wrap}
.ig label{font-size:11px;color:rgba(255,255,255,.4);white-space:nowrap;font-weight:600}
.ig input{width:72px;height:36px;background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.1);border-radius:10px;color:#a5d6a7;font-size:15px;font-weight:700;text-align:center;outline:none;font-family:monospace;transition:border-color .15s}
.ig input:focus{border-color:rgba(128,203,196,.5);background:rgba(255,255,255,.08)}
.tot{font-size:10px;color:rgba(255,255,255,.25)}

/* Event grid - pill buttons */
.eg{display:grid;grid-template-columns:repeat(4,1fr);gap:5px;margin-bottom:10px}
.eb{padding:10px 2px;border-radius:10px;font-size:11px;font-weight:700;text-align:center;line-height:1.2;transition:all .1s;border:1px solid transparent}
.eb:active{transform:scale(.95)}
.eb.s{border-color:#FFD700;box-shadow:0 0 12px rgba(255,215,0,.2)}
.e-ikocz{background:rgba(129,199,132,.12);color:#81c784;border-color:rgba(129,199,132,.15)}
.e-mumcz{background:rgba(229,115,115,.12);color:#e57373;border-color:rgba(229,115,115,.15)}
.e-dorcz{background:rgba(100,181,246,.12);color:#64b5f6;border-color:rgba(100,181,246,.15)}
.e-haya{background:rgba(255,213,79,.1);color:#ffd54f;border-color:rgba(255,213,79,.12)}
.e-epi{background:rgba(240,98,146,.1);color:#f06292;border-color:rgba(240,98,146,.12)}
.e-st{background:rgba(77,208,225,.1);color:#4dd0e1;border-color:rgba(77,208,225,.12)}
.e-ka{background:rgba(206,147,216,.1);color:#ce93d8;border-color:rgba(206,147,216,.12)}
.e-cka{background:rgba(234,128,252,.12);color:#ea80fc;border-color:rgba(234,128,252,.15)}
.e-stend{background:rgba(255,255,255,.04);color:rgba(255,255,255,.5);border-color:rgba(255,255,255,.06)}
.e-zencho{background:rgba(200,230,201,.08);color:#c8e6c9;border-color:rgba(200,230,201,.1)}
.e-other{background:rgba(255,255,255,.03);color:rgba(255,255,255,.4);border-color:rgba(255,255,255,.05)}

/* Detail inputs */
.dt{margin-bottom:8px}
.dt-t{font-size:10px;color:rgba(255,255,255,.35);margin-bottom:4px;font-weight:600}
.dt-r{display:flex;gap:4px;flex-wrap:wrap}
.dt-b{padding:6px 10px;border-radius:8px;font-size:11px;font-weight:700;background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.08);color:rgba(255,255,255,.5);transition:all .1s}
.dt-b.s{border-color:rgba(255,215,0,.5);color:#FFD700;background:rgba(255,215,0,.08)}
.dt-b:active{transform:scale(.96)}
.dt-f{width:100%;height:32px;background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.08);border-radius:8px;color:#ccc;font-size:12px;padding:0 10px;outline:none;font-family:inherit;transition:border-color .15s}
.dt-f:focus{border-color:rgba(128,203,196,.4)}

/* Add button */
.ab{width:100%;padding:14px;border-radius:12px;font-size:14px;font-weight:900;color:#fff;margin-top:6px;transition:all .1s}
.ab.ok{background:linear-gradient(135deg,#2e7d32,#1b5e20);box-shadow:0 4px 16px rgba(46,125,50,.3)}
.ab.no{background:rgba(255,255,255,.03);color:rgba(255,255,255,.2)}
.ab:active{transform:scale(.98)}

/* Recent entries mini */
.rec-t{font-size:10px;color:rgba(255,255,255,.25);padding:8px 14px 4px;font-weight:600}

/* === Timeline table === */
.tbl{width:100%;border-collapse:collapse;font-size:11px}
.tbl th{background:rgba(255,215,0,.08);color:rgba(255,215,0,.8);padding:6px 8px;font-weight:700;text-align:center;position:sticky;top:0;z-index:2;backdrop-filter:blur(10px);border-bottom:1px solid rgba(255,215,0,.1)}
.tbl td{padding:7px 8px;border-bottom:1px solid rgba(255,255,255,.03);vertical-align:top}
.tbl .gm{text-align:center;font-family:monospace;font-weight:700;color:rgba(255,255,255,.45);white-space:nowrap}
.tbl .ev{text-align:center;font-weight:700}
.tbl .nt{color:rgba(255,255,255,.35);font-size:10px}
.tbl .del-c{text-align:center;width:28px}
.td-d{width:22px;height:22px;border-radius:6px;background:rgba(255,100,100,.06);border:1px solid rgba(255,100,100,.15);color:#ff8a80;font-size:11px;display:flex;align-items:center;justify-content:center}
.c-iko{color:#81c784}.c-mum{color:#e57373}.c-dor{color:#64b5f6}
.c-haya{color:#ffd54f}.c-epi{color:#f06292}.c-st{color:#4dd0e1}
.c-ka{color:#ce93d8}.c-stend{color:rgba(255,255,255,.4)}.c-zen{color:#c8e6c9}
.tl-mt{text-align:center;color:rgba(255,255,255,.15);padding:30px;font-size:13px}

/* === Counter tab === */
.cnt{padding:8px 14px}
.cs{margin-bottom:10px;border-radius:12px;border:1px solid rgba(255,255,255,.06);background:rgba(255,255,255,.02);overflow:hidden}
.cs-h{padding:10px 12px;background:rgba(255,255,255,.03);display:flex;align-items:center;justify-content:space-between;cursor:pointer;user-select:none}
.cs-h .t{font-size:13px;font-weight:700;color:rgba(255,215,0,.85)}
.cs-h .ar{font-size:10px;color:rgba(255,255,255,.2);transition:transform .15s}
.cs-b{padding:6px 10px 10px}
.ci{padding:6px 2px;border-bottom:1px solid rgba(255,255,255,.03);display:flex;align-items:center;justify-content:space-between;gap:6px}
.ci-l{flex:1;min-width:0}.ci-n{font-size:12px;font-weight:600;color:rgba(255,255,255,.7)}
.ci-h{font-size:9px;color:#FFA726;background:rgba(255,167,38,.1);border-radius:4px;padding:1px 6px;display:inline-block;margin-top:2px;font-weight:700}
.ci-s{font-size:9px;color:rgba(255,255,255,.25);margin-top:1px}
.cw{display:flex;align-items:center;gap:4px}
.cm,.cp2{width:34px;height:34px;border-radius:8px;font-size:17px;font-weight:700;display:flex;align-items:center;justify-content:center;transition:transform .08s}
.cm{background:rgba(255,100,100,.08);border:1px solid rgba(255,100,100,.15);color:#ff8a80}
.cp2{background:rgba(100,255,100,.06);border:1px solid rgba(100,255,100,.12);color:#a5d6a7}
.cm:active,.cp2:active{transform:scale(.88)}
.vl{min-width:36px;height:34px;border-radius:8px;background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.06);display:flex;align-items:center;justify-content:center;font-size:15px;font-weight:700;color:#e0f0fa;font-family:monospace;padding:0 4px}

/* ===== Chance Eye Card System ===== */
.pt-wrap{margin-bottom:10px;border-radius:12px;border:1px solid rgba(255,255,255,.06);background:rgba(255,255,255,.02);overflow:hidden}
.pt-header{padding:10px 12px;background:rgba(255,255,255,.03);display:flex;align-items:center;justify-content:space-between;cursor:pointer;user-select:none}
.pt-header .t{font-size:13px;font-weight:700;color:rgba(255,215,0,.85)}
.pt-header .ar{font-size:10px;color:rgba(255,255,255,.2)}

/* Character filter tabs */
.pt-tabs{display:flex;gap:0;background:rgba(0,0,0,.3);border-bottom:1px solid rgba(255,255,255,.04)}
.pt-tab{flex:1;padding:8px 4px;text-align:center;font-size:11px;font-weight:700;color:rgba(255,255,255,.3);border-bottom:2px solid transparent;transition:all .15s}
.pt-tab.active{border-bottom-color:var(--tab-color,#FFD700);color:var(--tab-color,#FFD700)}
.pt-tab:active{opacity:.7}

/* Counter rows */
.pt-body{padding:8px 10px 10px}
.pt-row{display:flex;align-items:center;justify-content:space-between;padding:7px 0;border-bottom:1px solid rgba(255,255,255,.03)}
.pt-row:last-child{border-bottom:none}
.pt-row-l{flex:1;min-width:0}
.pt-row-name{font-size:12px;font-weight:600;color:rgba(255,255,255,.7)}
.pt-row-pts{font-size:9px;color:rgba(255,255,255,.25);margin-top:1px}
.pt-row-badge{display:inline-block;font-size:9px;font-weight:700;padding:1px 6px;border-radius:4px}

/* Tap counter - bigger for easy use */
.pt-cnt{display:flex;align-items:center;gap:5px}
.pt-minus,.pt-plus{width:38px;height:38px;border-radius:10px;font-size:18px;font-weight:700;display:flex;align-items:center;justify-content:center;transition:transform .08s}
.pt-minus{background:rgba(255,100,100,.08);border:1px solid rgba(255,100,100,.15);color:#ff8a80}
.pt-plus{background:rgba(100,255,100,.06);border:1px solid rgba(100,255,100,.12);color:#a5d6a7}
.pt-minus:active,.pt-plus:active{transform:scale(.85)}
.pt-val{min-width:38px;height:38px;border-radius:10px;background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.06);display:flex;align-items:center;justify-content:center;font-size:16px;font-weight:700;color:#e0f0fa;font-family:monospace;padding:0 4px}

/* Computed boxes */
.cc{margin-top:6px;padding:8px 10px;border-radius:10px;background:rgba(255,255,255,.02);border:1px solid rgba(255,255,255,.05);font-size:11px}
.cc-t{color:rgba(255,215,0,.8);font-weight:700;margin-bottom:3px;font-size:12px}
.cc-l{color:#80cbc4;margin-top:2px}.cc-hl{color:#FFD700;font-weight:700}
.cc-sub{color:rgba(255,255,255,.25);margin-top:2px;font-size:10px}
.cc-sp{margin-top:4px;padding-top:4px;border-top:1px solid rgba(255,255,255,.05)}

/* === Export tab === */
.exp{padding:14px}
.exp-h{font-size:12px;color:rgba(255,215,0,.7);font-weight:700;margin-bottom:6px}
.exp-ta{width:100%;min-height:300px;background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.06);border-radius:12px;padding:12px;color:#b0d8d8;font-size:11px;font-family:monospace;white-space:pre-wrap;resize:none;outline:none;-webkit-user-select:all;user-select:all}
</style>
</head>

var EVS=[
{id:"ikocz",l:"生駒CZ",c:"c-iko",cat:"cz"},{id:"mumcz",l:"無名CZ",c:"c-mum",cat:"cz"},
{id:"dorcz",l:"銅藍CZ",c:"c-dor",cat:"cz"},{id:"haya",l:"駿城ボーナス",c:"c-haya",cat:"bn"},

];
var EVBTNS=[
{id:"ikocz",l:"生駒CZ",c:"e-ikocz"},{id:"mumcz",l:"無名CZ",c:"e-mumcz"},
{id:"dorcz",l:"銅藍CZ",c:"e-dorcz"},{id:"haya",l:"駿城BN",c:"e-haya"},
{id:"epi",l:"エピBN",c:"e-epi"},{id:"st",l:"ST",c:"e-st"},
{id:"ka",l:"カバネリAT",c:"e-ka"},{id:"cka",l:"超カバネリAT",c:"e-cka"},
{id:"stend",l:"ST終了",c:"e-stend"},{id:"zencho",l:"海門前兆",c:"e-zencho"},
{id:"other",l:"その他",c:"e-other"}
];

var ST_SCR=[{id:"def",l:"鉄下駄"},{id:"all",l:"全員集合"},{id:"swim",l:"水着"}];

var CNTS=[
{id:"bell",t:"🔔 下段ベル",items:[{k:"bellCnt",l:"下段ベル（13枚）",s:"設1:1/121.1 設6:1/99.1"}]},
{id:"haya2",t:"🚂 駿城ボーナス中",items:[
{k:"hayaC",l:"単独チャンス目"},{k:"haya3k",l:"↑ うち3000pt",s:"設1:1.2% 設6:2.3%"}]},
{id:"cyc",t:"🔄 周期・ST",items:[
{k:"c3a",l:"3周期目到達"},{k:"c3b",l:"3周期目BN当選",s:"大きな設定差"},

{k:"o500",l:"500G超ハマり",s:"設6≒17%"}]},

{k:"t_cu",l:"トロフィー銅",h:"設2↑",dot:"#CD7F32"},{k:"t_si",l:"トロフィー銀",h:"設3↑",dot:"#C0C0C0"},
{k:"t_go",l:"トロフィー金",h:"設4↑",dot:"#FFD700"},{k:"t_ki",l:"キリン",h:"設5↑",dot:"#FF6347"},
{k:"t_ra",l:"虹",h:"設6",dot:"#DA70D6"},

{k:"z44",l:"+44枚",h:"設4↑"},{k:"z55",l:"+55枚",h:"設5↑"},
{k:"z66",l:"+66枚",h:"設6"},{k:"z77",l:"+77枚",h:"設6"},
{k:"ep7",l:"第七話",h:"設4↑確定"},{k:"bima",l:"美馬",h:"設4↑"}]}
];

var PT_ITEMS={
iko:[
{k:"lIkoC",l:"無発光",pt:1,badge:"1pt"},
{k:"lIkoL",l:"発光",pt:15,badge:"15pt"},

],

],

{k:"allC",l:"オールスター目",pt:60,badge:"各60pt",sub:"銅藍CZ濃厚"}
]
};

var ALL_CC_KEYS=["lIkoC","lIkoL","lIkoH","lIkoSm","lMumC","lMumL","lMumH","lMumSm","lKbnC","lKbnL","lKbnH","dblIM","dblIK","dblMK","dblIMh","dblIKh","dblMKh","allC","bellCnt","hayaC","haya3k","c3a","c3b","kSt","kLp","o500","t_cu","t_si","t_go","t_ki","t_ra","o456","o666","z44","z55","z66","z77","ep7","bima"];

var LOG=[],CC={},COL={},TAB="rec",inST=false;
var curEv=null,curG="",curRes=null,curTrig=null,curScr=null,curNote="",curMai="";
var rstP=false,rstT=null,SK="kb6";

function initC(){ALL_CC_KEYS.forEach(function(k){CC[k]=0});CNTS.forEach(function(s){COL[s.id]=false});COL["pt"]=false}
function load(){initC();try{var d=JSON.parse(localStorage.getItem(SK+"c"));if(d)for(var k in d)if(k in CC)CC[k]=d[k]}catch(e){}
try{LOG=JSON.parse(localStorage.getItem(SK+"l"))||[]}catch(e){LOG=[]}
inST=false;for(var i=LOG.length-1;i>=0;i-=1){if(LOG[i].ev==="st"){inST=true;break}if(LOG[i].ev==="stend"){break}}}
function save(){try{localStorage.setItem(SK+"c",JSON.stringify(CC));localStorage.setItem(SK+"l",JSON.stringify(LOG))}catch(e){}}

function est(k,v){var r=REF[k];if(!r||!v||v===Infinity)return null;var c=1,m=Infinity;for(var s=1;s<=6;s++){var d=Math.abs(v-r[s]);if(d<m){m=d;c=s}}return c}
function rate(n,d){return d?(n/d*100).toFixed(1):"0"}
function gev(id){for(var i=0;i<EVS.length;i++)if(EVS[i].id===id)return EVS[i];return null}

function totalG(){
var total=0,maxInInterval=0;
for(var i=0;i<LOG.length;i++){
var e=LOG[i],g=parseInt(e.g)||0;
if(e.ev==="st"||e.ev==="ka"||e.ev==="cka"||e.ev==="stend"){
if(e.ev==="stend"){total+=maxInInterval;maxInInterval=0}
continue}
if(g>maxInInterval)maxInInterval=g}
total+=maxInInterval;
